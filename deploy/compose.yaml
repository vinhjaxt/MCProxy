services:
  mcproxy:
    image: denoland/deno:distroless
    volumes:
      - ./mcproxy:/usr/local/bin/mcproxy:ro
      - ./mcproxy-config.json:/etc/mcproxy/config.json:ro
    entrypoint: ''
    command: ["/usr/local/bin/mcproxy", "/etc/mcproxy/config.json"]
    ports:
      - "127.0.0.1:8080:8080"
    read_only: false
    tmpfs:
      - /tmp:size=1m,mode=777,noexec
      - /run:size=1m,mode=777,noexec
    dns_search: .
    dns:
      - 1.1.1.1
      - 1.0.0.1
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 256m
    cpus: 1.00
    pids_limit: 128
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.tcp_keepalive_time: "120"
      net.ipv4.conf.default.rp_filter: "0"
      net.ipv4.conf.all.rp_filter: "0"
      net.ipv4.ip_local_port_range: "5000 65000"
      net.core.somaxconn: "65535"
      net.ipv4.tcp_max_syn_backlog: "4096"
      net.ipv4.tcp_fastopen: "3"
      net.ipv4.tcp_tw_reuse: "1"
      net.ipv4.tcp_fin_timeout: "7"