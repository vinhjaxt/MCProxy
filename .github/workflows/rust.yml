name: Rust

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust targets
      run: rustup target add x86_64-unknown-linux-musl aarch64-unknown-linux-musl

    - name: Install musl tools (amd64)
      run: sudo apt-get update && sudo apt-get install -y musl-tools

    - name: Build amd64 static binary
      run: |
        cargo build --release --target x86_64-unknown-linux-musl
        mv target/x86_64-unknown-linux-musl/release/mcproxy mcproxy-linux-amd64

    - name: Install aarch64 musl cross-compiler
      run: |
        wget -q https://github.com/vinhjaxt/public/releases/download/v1.0/aarch64-linux-musl-cross.tgz
        tar xzf aarch64-linux-musl-cross.tgz -C $HOME
        echo "$HOME/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH

    - name: Build arm64 static binary
      env:
        CC_aarch64_unknown_linux_musl: aarch64-linux-musl-gcc
      run: |
        cargo build --release --target aarch64-unknown-linux-musl
        mv target/aarch64-unknown-linux-musl/release/mcproxy mcproxy-linux-arm64

    - name: Run tests
      run: cargo test --verbose

    - name: Generate release tag
      if: github.event_name != 'pull_request'
      id: tag
      run: |
        sudo timedatectl set-timezone Asia/Ho_Chi_Minh
        sudo date -s "$(wget -qSO- --max-redirect=0 google.com 2>&1 | grep Date: | cut -d' ' -f5-8)Z"
        echo "release_tag=Release_$(date +"%Y.%m.%d_%H-%M-%S")" >> $GITHUB_OUTPUT
        echo "release_hash=$(git log --format="%H" -n 1)" >> $GITHUB_OUTPUT

    - name: Release
      if: github.event_name != 'pull_request'
      uses: softprops/action-gh-release@v1
      with:
        body: ${{ steps.tag.outputs.release_hash }}
        tag_name: ${{ steps.tag.outputs.release_tag }}
        files: |
          ./mcproxy-linux-amd64
          ./mcproxy-linux-arm64
